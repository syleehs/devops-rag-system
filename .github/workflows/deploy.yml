name: Deploy to production

on:
  push:
    branches: [main]
  workflow_dispatch:  # manual re-deploy from Actions UI

permissions:
  contents: read

concurrency:
  group: deploy-prod
  cancel-in-progress: false  # never cancel an in-flight prod deploy

jobs:
  deploy:
    name: Deploy to Fly.io
    runs-on: ubuntu-latest
    environment:
      name: production
      url: https://devops-rag-system.fly.dev
    steps:
      - uses: actions/checkout@v4

      - name: Setup flyctl
        uses: superfly/flyctl-actions/setup-flyctl@master

      - name: Deploy
        run: flyctl deploy --remote-only -a devops-rag-system
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

      - name: Smoke test /health
        run: |
          # Allow up to 90s for cold start (Fly + Neon both wake)
          for i in {1..18}; do
            status=$(curl -s -o /tmp/health.json -w "%{http_code}" \
              https://devops-rag-system.fly.dev/health || true)
            if [ "$status" = "200" ]; then
              echo "Health check passed:"
              cat /tmp/health.json
              echo
              exit 0
            fi
            echo "Attempt $i: HTTP $status — waiting 5s"
            sleep 5
          done
          echo "Health check failed after 90s"
          cat /tmp/health.json || true
          exit 1

      - name: Smoke test /query
        run: |
          response=$(curl -s -X POST https://devops-rag-system.fly.dev/query \
            -H "content-type: application/json" \
            -d '{"query":"how do we monitor node health?"}')
          echo "$response" | python3 -c "
          import sys, json
          d = json.loads(sys.stdin.read())
          assert d.get('answer'), 'No answer in response'
          assert len(d.get('sources', [])) > 0, 'No sources retrieved'
          print(f\"OK: {len(d['sources'])} sources, {len(d['answer'])} char answer\")
          "

  ingest-changed-kb:
    name: Ingest new/changed KB files
    runs-on: ubuntu-latest
    needs: deploy
    # Only run if knowledge_base/ changed in this push
    if: contains(github.event.head_commit.modified, 'knowledge_base/') || contains(github.event.head_commit.added, 'knowledge_base/')
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2  # need previous commit for diff
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install deps
        run: pip install -r backend/requirements.txt

      - name: Detect changed KB files
        id: changes
        run: |
          changed=$(git diff --name-only HEAD~1 HEAD -- 'knowledge_base/*.md' || true)
          echo "files<<EOF" >> "$GITHUB_OUTPUT"
          echo "$changed" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"
          if [ -z "$changed" ]; then
            echo "No KB changes; skipping ingest."
          else
            echo "Will ingest:"
            echo "$changed"
          fi

      - name: Incremental ingest
        if: steps.changes.outputs.files != ''
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          GROQ_API_KEY: not-used-for-ingest
        run: python scripts/ingest_changed_files.py
