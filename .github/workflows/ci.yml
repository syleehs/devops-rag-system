name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches-ignore: [main]  # main is handled by deploy.yml

permissions:
  contents: read
  pull-requests: write  # for coverage comments
  security-events: write  # for SARIF uploads

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install ruff
        run: pip install ruff==0.6.9
      - name: ruff format --check
        run: ruff format --check backend tests scripts
      - name: ruff check
        run: ruff check backend tests scripts

  test:
    name: Unit tests + coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install deps
        run: |
          pip install -r backend/requirements.txt
          pip install pytest pytest-cov
      - name: Run pytest (unit only — e2e runs in preview.yml)
        run: pytest --ignore=tests/e2e --cov=backend --cov-report=xml --cov-report=term-missing
      - name: Upload coverage to Codecov
        # Tokenless upload — Codecov supports this for public repos via GitHub OIDC.
        # No CODECOV_TOKEN secret needed.
        uses: codecov/codecov-action@v4
        with:
          files: ./coverage.xml
          fail_ci_if_error: false  # don't block PR on coverage upload hiccups

  security-sast:
    name: SAST (bandit)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install bandit
        run: pip install bandit[toml]
      - name: Run bandit
        # -ll: report only medium+ severity, -ii: report only medium+ confidence
        run: bandit -r backend -ll -ii

  security-deps:
    name: Dependency vulnerability scan
    runs-on: ubuntu-latest
    # Informational — Dependabot raises PRs to bump vulnerable deps. We don't fail the
    # build on transitive CVEs because that just creates flaky red CI when an upstream
    # dep gets a CVE filed. The job's job is to keep findings visible in PR run logs.
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install pip-audit
        run: pip install pip-audit
      - name: Audit deps
        run: pip-audit -r backend/requirements.txt

  security-secrets:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # gitleaks needs full history
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  security-docker:
    name: Docker image scan (Trivy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: backend/Dockerfile
          push: false
          load: true
          tags: devops-rag:ci-${{ github.sha }}
      - name: Run Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: devops-rag:ci-${{ github.sha }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"  # fail PR on CRITICAL/HIGH
      - name: Upload SARIF to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-results.sarif

  codeql:
    name: CodeQL (Python)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: github/codeql-action/init@v3
        with:
          languages: python
      - uses: github/codeql-action/analyze@v3
