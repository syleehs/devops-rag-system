version: 2
updates:
  - package-ecosystem: pip
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    labels: [dependencies, python]
    commit-message:
      prefix: "chore(deps)"
    groups:
      # Group security patches into one PR to reduce noise
      security:
        applies-to: security-updates
        patterns: ["*"]
      # Group minor/patch bumps; majors stay individual for review
      minor-and-patch:
        update-types: [minor, patch]

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, github-actions]
    commit-message:
      prefix: "chore(ci)"

  - package-ecosystem: docker
    directory: /backend
    schedule:
      interval: weekly
      day: monday
    labels: [dependencies, docker]
    commit-message:
      prefix: "chore(docker)"
