app = 'devops-rag-system'
primary_region = 'iad'

[build]
  dockerfile = 'backend/Dockerfile'

[env]
  ENVIRONMENT = 'production'
  LOG_LEVEL = 'INFO'
  OMP_NUM_THREADS = '1'
  TOKENIZERS_PARALLELISM = 'false'

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1

[checks]
  [checks.health]
    type = 'http'
    port = 8000
    path = '/health'
    interval = '30s'
    timeout = '10s'
    grace_period = '60s'
