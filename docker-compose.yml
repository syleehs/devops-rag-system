version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg15
    container_name: devops-rag-postgres
    environment:
      POSTGRES_DB: devops_rag
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - devops-rag-network

volumes:
  postgres_data:

networks:
  devops-rag-network:
    driver: bridge
